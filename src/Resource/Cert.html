<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SunnyNet HTTPS 证书安装</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, .72);
            --border: rgba(255, 255, 255, .12);
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family:
                    Inter,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;

            background:
                    radial-gradient(circle at top left, #1e3a8a 0%, transparent 40%),
                    radial-gradient(circle at bottom right, #0f766e 0%, transparent 40%),
                    linear-gradient(135deg, #050816, #0f172a);
        }

        .card {
            width: 100%;
            max-width: 760px;

            background: rgba(255, 255, 255, .06);

            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);

            border: 1px solid var(--border);

            border-radius: 24px;

            padding: 48px;

            box-shadow:
                    0 20px 60px rgba(0, 0, 0, .35),
                    inset 0 1px 0 rgba(255, 255, 255, .08);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;

            padding: 8px 14px;

            border-radius: 999px;

            background: rgba(59, 130, 246, .15);

            border: 1px solid rgba(59, 130, 246, .25);

            color: #93c5fd;

            font-size: 13px;
            margin-bottom: 24px;
        }

        .icon {
            font-size: 54px;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--text);
            font-size: 38px;
            line-height: 1.2;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .desc {
            color: var(--text-secondary);
            line-height: 1.9;
            font-size: 16px;
            margin-bottom: 34px;
        }

        .steps {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .step {
            flex: 1;
            min-width: 220px;

            background: rgba(255, 255, 255, .04);

            border: 1px solid rgba(255, 255, 255, .08);

            border-radius: 16px;

            padding: 18px;
        }

        .step-index {
            color: #60a5fa;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .step-title {
            color: #fff;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .step-desc {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.7;
        }

        .actions {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 220px;

            text-decoration: none;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 54px;

            border-radius: 14px;

            font-weight: 600;

            transition: .25s ease;
        }

        .btn-primary {
            background: linear-gradient(
                    135deg,
                    #3b82f6,
                    #2563eb
            );

            color: white;

            box-shadow:
                    0 10px 30px rgba(59, 130, 246, .35);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
        }

        .btn-secondary {
            border: 1px solid rgba(255,255,255,.12);
            background: rgba(255,255,255,.05);
            color: white;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,.08);
        }

        .notice {
            margin-top: 28px;

            padding: 18px;

            border-radius: 14px;

            background: rgba(245, 158, 11, .08);

            border: 1px solid rgba(245, 158, 11, .18);

            color: #fde68a;

            line-height: 1.8;
            font-size: 14px;
        }

        .footer {
            margin-top: 30px;

            text-align: center;

            color: rgba(255,255,255,.45);

            font-size: 13px;
        }

        @media (max-width: 768px) {

            .card {
                padding: 28px;
                border-radius: 20px;
            }

            h1 {
                font-size: 30px;
            }

            .desc {
                font-size: 15px;
            }

            .btn {
                width: 100%;
                flex: unset;
            }

            .icon {
                font-size: 46px;
            }
        }
    </style>
</head>

<body>

<div class="card">

    <div class="badge">
        HTTPS Traffic Debugging
    </div>

    <div class="icon">🔐</div>

    <h1>SunnyNet HTTPS 证书安装</h1>

    <div class="desc">
        为确保 HTTPS 流量能够正常解析，请先安装
        <strong>SunnyRoot 根证书</strong>。
        安装完成后，即可解密、查看和分析加密网络请求数据。
    </div>

    <div class="steps">

        <div class="step">
            <div class="step-index">
                STEP 01
            </div>

            <div class="step-title">
                下载根证书
            </div>

            <div class="step-desc">
                获取 SunnyRoot 根证书文件并保存到本地设备。
            </div>
        </div>

        <div class="step">
            <div class="step-index">
                STEP 02
            </div>

            <div class="step-title">
                导入系统信任库
            </div>

            <div class="step-desc">
                将证书添加至系统受信任根证书颁发机构。
            </div>
        </div>

    </div>

    <div class="actions">

        <a href="SunnyRoot.cer" class="btn btn-primary">
            下载 SunnyRoot 证书
        </a>

        <a href="install.html" class="btn btn-secondary">
            查看安装教程
        </a>

    </div>

    <div class="notice">
        <strong>注意：</strong>
        证书安装完成后，如浏览器或应用仍提示证书异常，
        请关闭并重新启动目标应用后再次尝试。
    </div>

    <div class="footer">
        Powered by SunnyNet Network Toolkit
    </div>

</div>

</body>
</html>
